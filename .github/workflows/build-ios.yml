name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (Unsigned Device Build)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Initialize Tauri iOS Project
        run: npx tauri ios init

      - name: Build iOS Application (Unsigned Physical Device Build)
        run: |
          npx tauri ios build --target aarch64 -- CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          # This compiles the Rust core for physical iOS devices (arm64) and builds the Xcode project without code signing.

      - name: Package Build Artifacts
        run: |
          mkdir -p build-output
          # Dynamically locate the built .app folder (Release-iphoneos) and copy it
          find src-tauri/gen/apple/build -name "*.app" -type d -exec cp -r {} build-output/ \;
          tar -czf budgetflow-ios.tar.gz -C build-output .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetflow-ios-device
          path: budgetflow-ios.tar.gz
          if-no-files-found: error
