name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (Unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Install npm dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Initialize Tauri iOS Project
        run: npx tauri ios init --no-interactive

      - name: Build iOS Application (Simulator target, unsigned)
        run: |
          npx tauri ios build --target aarch64-apple-ios-sim
          # This compiles the Rust core for the iOS simulator and creates the Xcode build outputs.

      - name: Compress Build Artifacts
        run: |
          mkdir -p build-output
          cp -r src-tauri/gen/apple/build/Build/Products/Debug-iphonesimulator/BudgetFlow.app build-output/ || true
          tar -czf budgetflow-ios.tar.gz -C build-output .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetflow-ios-simulator
          path: budgetflow-ios.tar.gz
          if-no-files-found: warn
